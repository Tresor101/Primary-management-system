<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Check Result</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #eef2ff 0%, #f5f3ff 50%, #ecfeff 100%);
      display: grid;
      place-items: center;
      padding: 1rem;
    }

    .entry-card {
      width: 100%;
      max-width: 520px;
      border: 0;
      border-radius: 1rem;
      box-shadow: 0 18px 38px rgba(15, 23, 42, 0.14);
      overflow: hidden;
    }

    .entry-header {
      background: linear-gradient(120deg, #2563eb, #7c3aed);
      color: #fff;
      padding: 1.2rem 1.4rem;
    }

    .entry-header h1 {
      margin: 0;
      font-size: 1.3rem;
      font-weight: 700;
    }

    .entry-header p {
      margin: 0.35rem 0 0;
      opacity: 0.95;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main class="card entry-card">
    <div class="entry-header">
      <h1>Check Result</h1>
      <p>Enter your Student ID to check your result.</p>
    </div>

    <div class="card-body p-4">
      <form id="studentIdForm" novalidate>
        <div class="mb-3">
          <label for="studentId" class="form-label fw-semibold">Student ID</label>
          <input
            id="studentId"
            name="studentId"
            type="text"
            class="form-control"
            placeholder="e.g. STU-20260304-1234"
            pattern="^STU-\d{8}-\d{4}$"
            required
          />
          <div class="invalid-feedback">Please enter a valid Student ID (e.g. STU-20260304-1234).</div>
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-primary btn-lg">Check Result</button>
        </div>
      </form>

      <div id="formMessage" class="alert mt-3 d-none" role="alert" aria-live="polite"></div>
    </div>
  </main>

  <script>
    const form = document.getElementById("studentIdForm");
    const studentIdInput = document.getElementById("studentId");
    const formMessage = document.getElementById("formMessage");

    studentIdInput.addEventListener("input", () => {
      studentIdInput.classList.remove("is-invalid");
      studentIdInput.setCustomValidity("");
    });

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      formMessage.className = "alert mt-3 d-none";
      formMessage.textContent = "";

      if (!form.checkValidity()) {
        form.classList.add("was-validated");
        studentIdInput.classList.add("is-invalid");
        formMessage.classList.remove("d-none");
        formMessage.classList.add("alert-danger");
        formMessage.textContent = "Please enter a valid Student ID.";
        return;
      }

      const enteredStudentId = studentIdInput.value.trim();

      formMessage.classList.remove("d-none");
      formMessage.classList.add("alert-success");
      formMessage.textContent = `Student ID ${enteredStudentId} submitted.`;

      // TODO: Replace this with actual backend/API request.
      // Example:
      // window.location.href = `/student-profile.html?id=${encodeURIComponent(enteredStudentId)}`;
    });
  </script>
</body>
</html>
